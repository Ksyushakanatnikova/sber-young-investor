<script>
  function goTab(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    const map = { home: 0, courses: 1, trainer: 2, market: 3 };
    document.querySelectorAll('.nav-tab')[map[id]].classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function checkAns(btn, correct) {
    const allBtns = document.querySelectorAll('.ans-btn');
    allBtns.forEach(b => b.disabled = true);
    if (correct) {
      btn.classList.add('correct');
      setTimeout(() => {
        document.getElementById('trainer-content').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
      }, 500);
    } else {
      btn.classList.add('wrong');
      allBtns.forEach(b => {
        if (b.textContent.trim().startsWith('Капитал')) b.classList.add('correct');
      });
    }
  }

  function resetTrainer() {
    document.getElementById('trainer-content').style.display = 'block';
    document.getElementById('result-box').style.display = 'none';
    document.querySelectorAll('.ans-btn').forEach(b => {
      b.disabled = false;
      b.classList.remove('correct', 'wrong');
    });
  }
</script>
